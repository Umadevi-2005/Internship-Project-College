<div class="container">
  <br /><br />
  <div class="row">
    <div class="card col-md-6 offset-md-3">
      <h2 class="text-center">{{ pageTitle() }}</h2>
      <div class="card-body">
        <form (ngSubmit)="saveOrUpdateDepartment()">

          <div class="form-group mb-2">
            <label class="form-label">Department Name:</label>
            <input type="text" name="departmentName" placeholder="Enter Department Name"
              class="form-control" [(ngModel)]="departmentName" />
          </div>

          <div class="form-group mb-2">
            <label class="form-label">Department Description:</label>
            <input type="text" name="departmentDescription" placeholder="Enter Department Description"
              class="form-control" [(ngModel)]="departmentDescription" />
          </div>

          <button type="submit" class="btn btn-success mb-2">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>
