<div class="container mt-5">
  <h2 class="text-center mb-4">List of Employees</h2>
  <button class="btn btn-primary mb-2" (click)="addNewEmployee()">Add Employee</button>
  <table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Employee Id</th>
        <th>Employee First Name</th>
        <th>Employee Last Name</th>
        <th>Employee Email Id</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (employee of employees; track employee.id) {
        <tr>
          <td>{{ employee.id }}</td>
          <td>{{ employee.firstName }}</td>
          <td>{{ employee.lastName }}</td>
          <td>{{ employee.email }}</td>
          <td>
            <button class="btn btn-info" (click)="updateEmployee(employee.id!)">Update</button>
            <button class="btn btn-danger" style="margin-left: 10px;" (click)="removeEmployee(employee.id!)">Delete</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
