<div class="d-flex align-items-center"
     style="min-height: 90vh; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            color: white; border-radius: 0 0 50px 50px;">
  <div class="container text-center">
    <h1 class="display-3 fw-bold mb-4">
      Empowering Your <span style="color: #60a5fa;">Workforce</span>
    </h1>
    <p class="lead mb-5 opacity-75 mx-auto" style="max-width: 700px;">
      A modern management suite designed for full-stack excellence.
      Manage employees, departments, and operations with precision.
    </p>
    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-light btn-lg px-5 py-3 fw-bold shadow" (click)="navigateToEmployees()">
        View Employees
      </button>
      <button class="btn btn-light btn-lg px-5 py-3 fw-bold shadow" (click)="navigateToAddDepartment()">
        + New Department
      </button>
    </div>
  </div>
</div>
